# DB
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:test.sqlite

# Flyway
quarkus.flyway.locations=db/migration/sqlite

# SMTP
quarkus.mailer.from=${MAILER_FROM:no-reply@example.com}
quarkus.mailer.host=${MAILER_HOST:smtp.example.com}
quarkus.mailer.port=${MAILER_PORT:465}
quarkus.mailer.username=${MAILER_USER:no-reply@example.com}
quarkus.mailer.password=${MAILER_PW:-}
quarkus.mailer.auth-methods=LOGIN
quarkus.mailer.login=REQUIRED
quarkus.mailer.tls=true